name: k6 Performance Tests

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: k6 scenario to run
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - load
          - stress
  pull_request:
    branches: [ main ]
    paths:
      - 'DeliveryService.API/**'
      - 'DeliveryService.Core/**'
      - 'DeliveryService.Infrastructure/**'
      - 'DeliveryService.K6/**'
      - '.github/workflows/k6.yml'

jobs:
  k6:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: deliverydb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deliverydb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://localhost:5166
      BASE_URL: http://localhost:5166
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=deliverydb;Username=postgres;Password=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Start API
        run: |
          dotnet run --configuration Release --no-build --project DeliveryService.API > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API and seeded data
        run: |
          for i in {1..60}; do
            if curl --fail --silent "$BASE_URL/api/packages" > packages.json; then
              count=$(jq 'length' packages.json)
              if [ "$count" -gt 0 ]; then
                exit 0
              fi
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Prepare k6 inputs
        run: |
          echo "TRACKING_CODE=$(jq -r '.[0].trackingCode' packages.json)" >> "$GITHUB_ENV"
          jq -r '[.[] | select(.status == "Created") | .id] | .[:25] | join(",")' packages.json > package_ids.txt
          echo "PACKAGE_IDS=$(cat package_ids.txt)" >> "$GITHUB_ENV"

      - name: Run smoke test on pull requests
        if: github.event_name == 'pull_request'
        run: k6 run DeliveryService.K6/smoke_test.js

      - name: Run selected k6 test
        if: github.event_name == 'workflow_dispatch'
        run: |
          case "${{ inputs.test_type }}" in
            smoke)
              k6 run DeliveryService.K6/smoke_test.js
              ;;
            load)
              k6 run DeliveryService.K6/load_test.js
              ;;
            stress)
              if [ -z "$PACKAGE_IDS" ]; then
                echo "No packages in Created status were found for stress test."
                exit 1
              fi
              k6 run DeliveryService.K6/stress_test.js
              ;;
          esac

      - name: Upload API log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-api-log
          path: api.log
