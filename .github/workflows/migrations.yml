name: Database Migrations

on:
  push:
    branches: [ main ]
    paths:
      - 'DeliveryService.API/**'
      - 'DeliveryService.Core/**'
      - 'DeliveryService.Infrastructure/**'
      - '.github/workflows/migrations.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'DeliveryService.API/**'
      - 'DeliveryService.Core/**'
      - 'DeliveryService.Infrastructure/**'
      - '.github/workflows/migrations.yml'
  workflow_dispatch:

jobs:
  migrations:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: deliverydb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d deliverydb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=deliverydb;Username=postgres;Password=postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef --version 8.*

      - name: List migrations
        run: dotnet ef migrations list --project DeliveryService.Infrastructure --startup-project DeliveryService.API

      - name: Apply migrations
        run: dotnet ef database update --project DeliveryService.Infrastructure --startup-project DeliveryService.API

      - name: Generate idempotent SQL script
        run: |
          mkdir -p artifacts
          dotnet ef migrations script --idempotent --output artifacts/migrations.sql --project DeliveryService.Infrastructure --startup-project DeliveryService.API

      - name: Upload migration script
        uses: actions/upload-artifact@v4
        with:
          name: migrations-sql
          path: artifacts/migrations.sql
